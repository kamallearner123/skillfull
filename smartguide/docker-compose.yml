services:

  # ── Redis (conversation memory) ───────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - smartguide_redis_data:/data

  # ── SmartGuide FastAPI service ────────────────────────────────────────────
  smartguide:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    shm_size: '2gb' # vLLM requires a large shared memory size
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/1
      - VLLM_USE_V1=0 # Ensure we use the stable V0 engine
      - VLLM_USE_TRITON_FLASH_ATTN=0
      - VLLM_DISABLE_FLASH_ATTN=1
      - VLLM_NO_USAGE_STATS=1
      - VLLM_DISABLE_CUSTOM_ALL_REDUCE=1
      - VLLM_WORKER_MULTIPROC_METHOD=spawn
    volumes:
      - ./app:/app/app
      - ./models:/app/models
      - smartguide_chroma_data:/app/chroma_db
      - ./knowledge:/app/knowledge
    depends_on:
      redis:
        condition: service_started
    # GPU reservation is OPTIONAL — comment out if no NVIDIA GPU is available.
    # To enable GPU: install nvidia-container-toolkit and uncomment below.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]

volumes:
  smartguide_redis_data:
  smartguide_chroma_data:
